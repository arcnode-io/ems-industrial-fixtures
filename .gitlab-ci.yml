stages:
  - check
  - publish
  - mirror

check:
  stage: check
  script:
    - cargo cmd checks
    - cargo nextest run --workspace --lib --no-default-features --cargo-profile dev --target x86_64-unknown-linux-gnu
    - cargo tarpaulin --skip-clean --workspace --lib --no-default-features --target-dir=target/coverage --out Xml
  coverage: '/^\d+.\d+% coverage/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml

publish-mock-modbus-server:
  stage: publish
  script:
    - aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws
    - docker build -f mock-modbus-server/Dockerfile -t public.ecr.aws/y1d2j6a8/mock-modbus-server .
    - docker push public.ecr.aws/y1d2j6a8/mock-modbus-server
  only:
    - main

