stages:
  - check
  - publish
  - mirror

check:
  stage: check
  script:
    - cargo cmd checks
    - cargo nextest run --workspace --lib --no-default-features --cargo-profile dev --target x86_64-unknown-linux-gnu
    - cargo tarpaulin --skip-clean --workspace --lib --no-default-features --target-dir=target/coverage --out Xml
  coverage: '/^\d+.\d+% coverage/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml

publish-mock-modbus-server:
  stage: publish
  script:
    - docker login -u admin -p $HARBOR_PASSWORD 173.211.12.43:8083
    - docker build -f mock-modbus-server/Dockerfile -t 173.211.12.43:8083/library/mock-modbus-server .
    - docker push 173.211.12.43:8083/library/mock-modbus-server
  only:
    - main

